# CI (docs/06 §8): verify + golden + e2e + no-secret on every push. Green CI is the phase exit
# condition (plus per-phase extras in phases/00-overview.md).
image: node:22

definitions:
  caches:
    npm: ~/.npm

pipelines:
  default:
    - step:
        name: Verify (typecheck · lint · test · size · golden · no-secret)
        caches:
          - npm
        script:
          - npm ci
          - npm run build
          - npm run verify
          - npm run test:golden
          - npm run check:no-secret
    - step:
        name: E2E + a11y (fixtures mode)
        caches:
          - npm
        script:
          - npm ci
          - npx playwright install --with-deps chromium webkit
          - npm run build
          - npm run test:e2e
          - npm run test:a11y

  # Release gate (P4-T08 / GP-15): on every v* tag, enforce the pre-publish guardrails — build,
  # size budgets, no-secret, and package-contents/SRI validation — BEFORE any publish. The real
  # dual publish (CDN sdk.treatink.com/v1/ + `npm publish`) is the guarded go-live step: it requires
  # a maintainer to set `private:false` + a real version and configure NPM_TOKEN (see RELEASING.md).
  # Kept out of CI here so no tag can trigger an unreviewed publish.
  tags:
    'v*':
      - step:
          name: Release gate (dry-run — build · size · no-secret · pack · SRI)
          caches:
            - npm
          script:
            - npm ci
            - npm run release:dry-run
